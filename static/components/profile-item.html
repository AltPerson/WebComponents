<template id="profile-item">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    :host { display: block; }
    .item {
      display: grid; grid-template-columns: 1fr auto; gap: 0.5rem;
      align-items: center; padding: 0.6rem;
      border-radius: 8px; border: 1px solid #d8dee6; background: #fff; margin-bottom: 0.5rem;
    }
    .name { font-weight: 600; }
    .email { color: #4d5761; font-size: 0.9rem; }
    .actions { display: flex; gap: 0.4rem; }
  </style>
  <div class="item">
    <div>
      <div class="name" id="name"></div>
      <div class="email" id="email"></div>
    </div>
    <div class="actions">
      <button id="open" type="button" class="secondary">Open</button>
      <button id="delete" type="button" class="danger">Delete</button>
    </div>
  </div>
</template>
